<svg
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="timeline-title timeline-desc"
  viewBox="0 0 900 1120"
>
  <title id="timeline-title">Evolución de la analítica de aprendizaje</title>
  <desc id="timeline-desc">
    Línea del tiempo vertical que resume cómo la analítica de aprendizaje pasó
    de bases académicas y plataformas digitales a modelos predictivos,
    inteligencia artificial generativa y retos de privacidad, transparencia,
    equidad y sentido pedagógico.
  </desc>
  <defs>
    <style>
      text {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .title {
        fill: #20294d;
        font-size: 34px;
        font-weight: 820;
      }
      .subtitle {
        fill: #566078;
        font-size: 18px;
        font-weight: 560;
      }
      .year {
        fill: #20294d;
        font-size: 15px;
        font-weight: 820;
        text-anchor: middle;
      }
      .stage {
        fill: #f8f6f0;
        font-size: 22px;
        font-weight: 780;
      }
      .body {
        fill: #f8f6f0;
        font-size: 17px;
        font-weight: 540;
      }
      .stage-dark {
        fill: #20294d;
        font-size: 22px;
        font-weight: 780;
      }
      .body-dark {
        fill: #20294d;
        font-size: 17px;
        font-weight: 540;
      }
    </style>
  </defs>

  <rect width="900" height="1120" fill="#eee8dc" />
  <rect x="36" y="34" width="828" height="1052" rx="18" fill="#f8f6f0" stroke="#d8d0c4" />

  <text class="title" x="78" y="88">Evolución de la analítica de aprendizaje</text>
  <text class="subtitle" x="78" y="122">
    Del registro de datos educativos a la inteligencia artificial generativa.
  </text>

  <line x1="92" y1="215" x2="92" y2="1013" stroke="#d8d0c4" stroke-width="6" />

  <circle cx="92" cy="253" r="15" fill="#144c9e" />
  <rect x="124" y="236" width="150" height="34" rx="17" fill="#e7eefb" />
  <text class="year" x="199" y="258">Antes de 2000</text>
  <rect x="304" y="190" width="516" height="126" rx="12" fill="#144c9e" />
  <text class="stage" x="336" y="228">Bases</text>
  <text class="body" x="336" y="262">
    <tspan x="336" dy="0">Se usa información académica</tspan>
    <tspan x="336" dy="28">para comprender cómo se aprende.</tspan>
  </text>

  <circle cx="92" cy="405" r="15" fill="#155dc9" />
  <rect x="124" y="388" width="150" height="34" rx="17" fill="#e7eefb" />
  <text class="year" x="199" y="410">2000-2009</text>
  <rect x="304" y="342" width="516" height="126" rx="12" fill="#155dc9" />
  <text class="stage" x="336" y="380">Expansión digital</text>
  <text class="body" x="336" y="414">
    <tspan x="336" dy="0">Las plataformas dejan huellas:</tspan>
    <tspan x="336" dy="28">accesos, tareas, foros y videos.</tspan>
  </text>

  <circle cx="92" cy="557" r="15" fill="#1667df" />
  <rect x="124" y="540" width="150" height="34" rx="17" fill="#e7eefb" />
  <text class="year" x="199" y="562">2010-2015</text>
  <rect x="304" y="494" width="516" height="126" rx="12" fill="#1667df" />
  <text class="stage" x="336" y="532">Consolidación del campo</text>
  <text class="body" x="336" y="566">
    <tspan x="336" dy="0">La analítica de aprendizaje</tspan>
    <tspan x="336" dy="28">se reconoce como área propia.</tspan>
  </text>

  <circle cx="92" cy="709" r="15" fill="#2876e9" />
  <rect x="124" y="692" width="150" height="34" rx="17" fill="#e7eefb" />
  <text class="year" x="199" y="714">2016-2020</text>
  <rect x="304" y="646" width="516" height="126" rx="12" fill="#2876e9" />
  <text class="stage" x="336" y="684">Modelos predictivos</text>
  <text class="body" x="336" y="718">
    <tspan x="336" dy="0">El aprendizaje automático detecta</tspan>
    <tspan x="336" dy="28">riesgo y orienta apoyos tempranos.</tspan>
  </text>

  <circle cx="92" cy="861" r="15" fill="#3f85ee" />
  <rect x="124" y="844" width="150" height="34" rx="17" fill="#e7eefb" />
  <text class="year" x="199" y="866">2022-2025</text>
  <rect x="304" y="798" width="516" height="126" rx="12" fill="#3f85ee" />
  <text class="stage" x="336" y="836">IA generativa</text>
  <text class="body" x="336" y="870">
    <tspan x="336" dy="0">Aparecen sistemas que generan</tspan>
    <tspan x="336" dy="28">explicaciones y retroalimentación.</tspan>
  </text>

  <circle cx="92" cy="1013" r="15" fill="#20294d" />
  <rect x="124" y="996" width="150" height="34" rx="17" fill="#e7eefb" />
  <text class="year" x="199" y="1018">Futuro</text>
  <rect x="304" y="950" width="516" height="126" rx="12" fill="#eee8dc" stroke="#d8d0c4" />
  <text class="stage-dark" x="336" y="988">Retos</text>
  <text class="body-dark" x="336" y="1022">
    <tspan x="336" dy="0">Privacidad, transparencia, equidad</tspan>
    <tspan x="336" dy="28">y sentido pedagógico.</tspan>
  </text>
</svg>
